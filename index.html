<!DOCTYPE html>
<html>
<head>
    <title>Насос 3D модель</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: Arial; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
    <div id="info">
        🖱️ Мышь: вращать | ПКМ: панорама | Колесо: приблизить
    </div>
    <canvas id="canvas" style="width: 100%; height: 100%; display: block;"></canvas>
    <script>
        const canvas = document.getElementById("canvas");
        const engine = new BABYLON.Engine(canvas);
        const scene = new BABYLON.Scene(engine);
        
        // Камера для удобного просмотра
        const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI/2, Math.PI/3, 3, new BABYLON.Vector3(0, 0, 0), scene);
        camera.attachControl(canvas, true);
        camera.wheelPrecision = 50;
        
        // Свет
        const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
        light.intensity = 0.8;
        
        // Вспомогательный свет спереди
        const fillLight = new BABYLON.DirectionalLight("fillLight", new BABYLON.Vector3(0, 0, -1), scene);
        fillLight.intensity = 0.5;
        
        // Загрузка модели
        BABYLON.SceneLoader.Append("https://raw.githubusercontent.com/mezenovperm/pump/main/", "pump1.glb", scene, function() {
            console.log("Модель загружена!");
        });
        
        engine.runRenderLoop(() => scene.render());
        
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
